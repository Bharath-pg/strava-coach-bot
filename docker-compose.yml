services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant
      POSTGRES_DB: assistant_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      target: bot
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://assistant:assistant@postgres:5432/assistant_db
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && python -m src.main"

  # MCP server uses stdio transport -- it's invoked on-demand by MCP clients
  # (Cursor, Claude Desktop, etc.), not run as a persistent service.
  # To start manually: docker-compose run --rm mcp-server
  mcp-server:
    build:
      context: .
      target: mcp-server
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://assistant:assistant@postgres:5432/assistant_db
    stdin_open: true
    profiles:
      - mcp

volumes:
  pgdata:
